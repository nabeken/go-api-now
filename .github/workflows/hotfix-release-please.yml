name: hotfix-release-please

on:
  push:
    branches:
      - hotfix

permissions:
  contents: write
  pull-requests: write


jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          release-type: go
          package-name: go-api-now
          default-branch: hotfix
